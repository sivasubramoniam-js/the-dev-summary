<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Daily Tech | Realtime Feed</title>

    <!-- Top-tier Typography from Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;700&family=Lora:ital,wght@0,400;0,600;0,700;1,400&family=Playfair+Display:ital,wght@0,800;1,800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root {
            --bg-page: #f9f8f4;
            /* High-end magazine paper texture approximation */
            --text-main: #111111;
            --text-muted: #5a5a5a;
            --accent: #d32f2f;
            /* Deep editorial red */
            --border-color: #111111;

            /* Typography Variables */
            --font-mono: 'JetBrains Mono', monospace;
            --font-sans: 'Inter', sans-serif;
            --font-serif: 'Lora', serif;
            --font-display: 'Playfair Display', serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-sans);
            background-color: var(--bg-page);
            color: var(--text-main);
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* ---------------- MASTHEAD ---------------- */
        .masthead {
            max-width: 1400px;
            margin: 0 auto;
            border-bottom: 3px solid var(--border-color);
            padding: 20px;
            text-align: center;
        }

        .masthead-meta {
            display: flex;
            justify-content: space-between;
            font-family: var(--font-mono);
            font-size: 0.75rem;
            text-transform: uppercase;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 15px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .masthead h1 {
            font-family: var(--font-display);
            font-size: clamp(3rem, 10vw, 7rem);
            letter-spacing: -0.02em;
            text-transform: uppercase;
            color: var(--text-main);
        }

        .masthead p {
            font-family: var(--font-serif);
            font-style: italic;
            font-size: 1.2rem;
            color: var(--text-muted);
        }

        /* ---------------- NAVIGATION ---------------- */
        .sticky-nav {
            position: sticky;
            top: 0;
            background-color: var(--bg-page);
            border-bottom: 1px solid var(--border-color);
            z-index: 100;
        }

        .nav-links {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: center;
            gap: 3rem;
            padding: 15px 20px;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--text-main);
            font-family: var(--font-mono);
            font-size: 0.85rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            transition: color 0.3s;
        }

        .nav-links a i {
            margin-right: 8px;
            font-size: 1rem;
        }

        .nav-links a:hover,
        .nav-links a.active {
            color: var(--accent);
        }

        /* ---------------- MAIN FEED ---------------- */
        main {
            max-width: 1400px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .section-header {
            font-family: var(--font-mono);
            font-size: 1.1rem;
            text-transform: uppercase;
            font-weight: 700;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .section-header::after {
            content: "";
            flex: 1;
            height: 2px;
            background-color: var(--border-color);
        }

        /* ---------------- GRID LAYOUT ---------------- */
        #news-feed {
            display: grid;
            grid-template-columns: repeat(12, 1fr);
            gap: 40px;
        }

        .news-card {
            display: flex;
            flex-direction: column;
            text-decoration: none;
            color: inherit;
            group: card;
            padding-bottom: 25px;
            border-bottom: 1px solid var(--border-color);

            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .news-card:hover {
            cursor: pointer;
        }

        /* Responsive Grid Spans */
        .card-featured {
            grid-column: span 12;
            flex-direction: row;
            gap: 40px;
            border-bottom: 3px solid var(--border-color);
            padding-bottom: 40px;
        }

        .card-regular {
            grid-column: span 4;
        }

        .card-side {
            grid-column: span 3;
            border-left: 1px solid var(--border-color);
            padding-left: 25px;
        }

        .card-wide {
            grid-column: span 6;
        }

        /* Image Display */
        .news-image-wrapper {
            width: 100%;
            height: 220px;
            overflow: hidden;
            margin-bottom: 20px;
            background: #e0e0e0;
            position: relative;
        }

        .card-featured .news-image-wrapper {
            flex: 3;
            height: 480px;
            margin-bottom: 0;
        }

        .card-featured .news-content {
            flex: 2;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .news-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(100%) contrast(1.1) brightness(0.9);
            transition: filter 0.6s ease, transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .news-card:hover .news-image {
            filter: grayscale(0%) contrast(1) brightness(1);
            transform: scale(1.05);
            /* Subtle zoom */
        }

        /* Article Meta & Content */
        .news-meta {
            font-family: var(--font-mono);
            font-size: 0.7rem;
            color: var(--accent);
            text-transform: uppercase;
            font-weight: 700;
            margin-bottom: 12px;
            letter-spacing: 0.5px;
            display: flex;
            justify-content: space-between;
        }

        .news-title {
            font-family: var(--font-serif);
            font-size: 1.6rem;
            font-weight: 700;
            line-height: 1.2;
            margin: 0 0 12px 0;
            color: var(--text-main);
        }

        .card-featured .news-title {
            font-size: 3rem;
            line-height: 1.1;
            margin-bottom: 20px;
        }

        .card-wide .news-title {
            font-size: 2rem;
        }

        /* Underline Animation Effect */
        .title-hover-effect {
            background-image: linear-gradient(var(--text-main), var(--text-main));
            background-size: 0% 1px;
            background-position: left bottom;
            background-repeat: no-repeat;
            transition: background-size 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .news-card:hover .title-hover-effect {
            background-size: 100% 1px;
        }

        .news-desc {
            font-family: var(--font-sans);
            font-size: 1rem;
            color: var(--text-muted);
            line-height: 1.6;
            margin: 0;
        }

        .card-featured .news-desc {
            font-size: 1.2rem;
        }

        .card-side .news-desc {
            font-size: 0.9rem;
        }

        /* Footer */
        footer {
            border-top: 3px solid var(--border-color);
            padding: 40px 20px;
            text-align: center;
            font-family: var(--font-mono);
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 60px;
            background: var(--text-main);
            color: var(--bg-page);
        }

        .loading-text {
            grid-column: span 12;
            text-align: center;
            padding: 80px 0;
            font-family: var(--font-mono);
            font-size: 1.2rem;
            color: var(--text-muted);
            text-transform: uppercase;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 0.5;
            }

            50% {
                opacity: 1;
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Responsive Design */
        @media (max-width: 1200px) {
            .card-featured .news-image-wrapper {
                height: 400px;
            }

            .card-regular {
                grid-column: span 6;
            }

            .card-side {
                grid-column: span 6;
                border-left: none;
                padding-left: 0;
            }
        }

        @media (max-width: 900px) {
            .masthead h1 {
                font-size: 4.5rem;
            }

            .card-featured {
                flex-direction: column;
                gap: 20px;
            }

            .card-featured .news-image-wrapper {
                height: 350px;
            }

            .nav-links {
                gap: 1.5rem;
            }
        }

        @media (max-width: 600px) {
            .masthead h1 {
                font-size: 3.5rem;
            }

            .masthead-meta {
                flex-direction: column;
                gap: 10px;
                align-items: center;
            }

            .nav-links {
                flex-wrap: wrap;
                justify-content: center;
            }

            .card-regular,
            .card-side,
            .card-wide,
            .card-featured {
                grid-column: span 12;
            }

            .card-featured .news-title {
                font-size: 2.2rem;
            }

            #news-feed {
                gap: 30px;
            }
        }

        /* Google Translate overriding styles */
        .goog-te-gadget {
            font-family: var(--font-mono) !important;
            font-size: 0px !important;
            /* Hide the Powered by Google text */
            color: transparent !important;
        }

        .goog-te-combo {
            font-family: var(--font-mono) !important;
            font-size: 0.75rem !important;
            border: 1px solid var(--border-color);
            background-color: var(--bg-page);
            color: var(--text-main);
            padding: 2px 5px;
            margin: 0 !important;
            text-transform: uppercase;
        }

        .goog-logo-link {
            display: none !important;
        }

        body {
            top: 0 !important;
            /* Remove the gap space google leaves at the top */
        }

        .skiptranslate iframe {
            display: none !important;
            /* Hide the google translate top bar */
        }

        .skiptranslate>span>a,
        .VIpgJd-ZVi9od-aZ2wEe-wOHMyf {
            display: none;
        }

        /* Disable Google Translate original text hover tooltip and highlight */
        .goog-tooltip,
        .goog-tooltip:hover,
        #goog-gt-tt,
        .goog-te-balloon-frame {
            display: none !important;
            visibility: hidden !important;
        }

        .goog-text-highlight {
            background-color: transparent !important;
            border: none !important;
            box-shadow: none !important;
        }

        .marquee {
            overflow: hidden;
            white-space: nowrap;
            background-color: var(--bg-page);
            border-top: 1px solid var(--border-color);
            border-bottom: 1px solid var(--border-color);
            padding: 10px 0;
            width: 100vw;
            max-width: 1400px;
            margin: 0 auto;
        }

        .marquee-content {
            display: inline-block;
            animation: marquee linear infinite;
        }

        .marquee-content span {
            margin-right: 50px;
        }

        @keyframes marquee {
            0% {
                transform: translateX(19%);
            }

            100% {
                transform: translateX(-100%);
            }
        }
    </style>
</head>

<body>

    <header class="masthead">
        <div class="masthead-meta">
            <span id="dateDisplay"></span>
            <span id="google_translate_element"></span>
        </div>
        <h1>The Daily Tech</h1>
        <p>Curated signals from the noise of the digital age.</p>
    </header>

    <!-- scrolling marquee text based on the title of each news -->
    <div class="marquee">
        <div class="marquee-content">
            <span id="marqueeText"></span>
        </div>
    </div>

    <main>
        <div class="section-header">
            Top Technology Events
        </div>
        <div id="news-feed">
            <div class="loading-text">Fetching the latest dispatches...</div>
        </div>
    </main>

    <footer>
        <p>The Daily Tech ©
            <script>document.write(new Date().getFullYear())</script> — Minimalist Tech Editorial
        </p>
    </footer>

    <script>
        // Global Action Handlers
        function copyToClipboard(event) {
            event.preventDefault();
            event.stopPropagation();

            const card = event.target.closest('.news-card');
            if (!card) return;

            // Extract dynamically rendered text directly from DOM using textContent which is immune to visibility/translation DOM wrapping quirks
            const title = card.querySelector('.news-title')?.textContent.trim() || '';
            const description = card.querySelector('.news-desc')?.textContent.trim() || '';
            const textToCopy = `${title} : ${description}`;

            navigator.clipboard.writeText(textToCopy).then(() => {
                const icon = event.target;
                const originalClass = icon.className;
                icon.className = 'fas fa-check text-green-500';
                icon.style.color = 'var(--text-main)';
                setTimeout(() => {
                    icon.className = originalClass;
                    icon.style.color = '';
                }, 2000);
            }).catch(err => console.error('Failed to copy: ', err));
        }

        // Ensure voices are loaded asynchronously in advance for Chrome
        if ('speechSynthesis' in window) {
            window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
        }

        function speakText(event) {
            event.preventDefault();
            event.stopPropagation();

            const card = event.target.closest('.news-card');
            if (!card) return;

            const title = card.querySelector('.news-title')?.textContent.trim() || '';
            const description = card.querySelector('.news-desc')?.textContent.trim() || '';

            if ('speechSynthesis' in window) {
                // Stop any current standard speech
                window.speechSynthesis.cancel();
                // Stop any remote fallback speech
                if (window.currentRemoteAudio) {
                    window.currentRemoteAudio.pause();
                    window.currentRemoteAudio = null;
                }

                // Use localStorage first (crucial for local file:// execution), then custom cookie, then Googtrans
                let lang = document.documentElement.lang || 'en-US';
                let savedLang = null;
                try { savedLang = localStorage.getItem('custom_lang'); } catch (e) { }
                console.log("Saved lang : ", savedLang)

                const customMatch = document.cookie.match(/(^|;) ?custom_lang=([^;]*)(;|$)/);
                if (savedLang) {
                    lang = savedLang;
                } else if (customMatch && customMatch[2]) {
                    lang = customMatch[2];
                } else {
                    const match = document.cookie.match(/(^|;) ?googtrans=([^;]*)(;|$)/);
                    if (match) {
                        const parts = match[2].split('/');
                        if (parts.length > 2) {
                            lang = parts[2];
                        }
                    }
                }
                console.log("Speaking in lang:", lang);

                // Helper to explicitly assign the nearest matching system voice
                const configureUtterance = (utt) => {
                    utt.lang = lang;
                    const voices = window.speechSynthesis.getVoices();
                    let matchedVoice = null;
                    if (voices.length > 0) {
                        const searchLang = lang.toLowerCase().replace('_', '-');

                        // Specifically hunt for premium/news-reader voices for English
                        if (searchLang.startsWith('en')) {
                            const premiumNewsVoices = [
                                'Google UK English Male',
                                'Google US English',
                                'Daniel',
                                'Tom',
                                'Ava',
                                'Fiona'
                            ];
                            for (const preferred of premiumNewsVoices) {
                                matchedVoice = voices.find(v => v.name.includes(preferred) && v.lang.toLowerCase().startsWith('en'));
                                if (matchedVoice) break;
                            }
                        }

                        // Standard matching for non-English or fallback
                        if (!matchedVoice) {
                            matchedVoice = voices.find(v => v.lang.toLowerCase() === searchLang);
                        }
                        if (!matchedVoice) {
                            // Fallback to partial match (e.g., matching 'fr-FR' when looking for 'fr')
                            matchedVoice = voices.find(v => v.lang.toLowerCase().startsWith(searchLang.split('-')[0]));
                        }
                        if (matchedVoice) {
                            utt.voice = matchedVoice;
                        }
                    }
                    utt.rate = 1.0; // Ensure utterance speed is set firmly to 'normal' (1.0)
                    utt.pitch = 1.0;
                    return matchedVoice;
                };

                // Standardize utterance delivery directly to the OS Speech Synthesis engine.
                // Modern browsers seamlessly map missing phonetic engines organically.

                let utterance = new SpeechSynthesisUtterance(title);
                configureUtterance(utterance);
                window.speechSynthesis.speak(utterance);

                // Add a pause before speaking the description
                utterance.onend = function (e) {
                    let descUtterance = new SpeechSynthesisUtterance(description);
                    configureUtterance(descUtterance);
                    setTimeout(() => {
                        window.speechSynthesis.speak(descUtterance);
                    }, 1250);
                };
            } else {
                alert("Text-to-speech is not supported in this browser.");
            }
        }

        function downloadAsImage(event) {
            event.preventDefault();
            event.stopPropagation();

            const icon = event.target;
            const originalIconClass = icon.className;
            icon.className = "fas fa-spinner fa-spin"; // Show loading state

            const card = event.target.closest('.news-card');

            const renderAndDownload = () => {
                // Extract the exact textual and visual content asynchronously
                const imgEl = card.querySelector('.news-image');
                const imgSrc = imgEl ? imgEl.src : null;
                const title = card.querySelector('.news-title').textContent.trim();
                const desc = card.querySelector('.news-desc').textContent.trim();
                const dateEl = document.getElementById('dateDisplay');
                const dateStr = dateEl ? dateEl.textContent.trim() : "The Daily Tech";

                // Programmatically construct a perfectly structured exact 4:5 offline poster div (1080x1350 resolution)
                const poster = document.createElement('div');
                poster.style.position = 'absolute'; // Position absolute avoids viewport issues during scaling
                poster.style.top = '-9999px'; // Render entirely off-screen
                poster.style.left = '-9999px';
                poster.style.width = '1080px';
                poster.style.height = '1350px';
                poster.style.backgroundColor = '#f9f8f4'; // Premium editorial paper white
                poster.style.padding = '80px 80px 10px 80px'; // 10px exactly at the bottom precisely locks the footer!
                poster.style.boxSizing = 'border-box';
                poster.style.display = 'flex';
                poster.style.flexDirection = 'column';
                poster.style.color = 'var(--text-main)';
                poster.style.zIndex = '-100';

                // Safely format Image Block utilizing CSS background properties to bypass html2canvas object-fit bugs
                let imgHTML = '';
                if (imgSrc) {
                    imgHTML = `
                        <div style="width: 100%; height: 500px; border-radius: 4px; margin-bottom: 40px; border: 1px solid rgba(0,0,0,0.1); background-color: #e0e0e0; background-image: url('${imgSrc}'); background-size: cover; background-position: center; background-repeat: no-repeat;">
                        </div>
                    `;
                }

                // Build immaculate HTML Layout natively
                poster.innerHTML = `
                    <div style="flex-grow: 1; display: flex; flex-direction: column;">
                        <div style="display: flex; justify-content: space-between; align-items: flex-end; border-bottom: 3px solid var(--border-color); padding-bottom: 25px; margin-bottom: 40px;">
                            <div style="font-family: var(--font-display), serif; font-size: 40px; text-transform: uppercase; font-weight: 800; line-height: 1; letter-spacing: -0.02em;">The Daily Tech</div>
                            <div style="font-family: var(--font-mono), monospace; font-size: 22px; color: var(--text-muted); text-transform: uppercase;">${dateStr}</div>
                        </div>
                        
                        ${imgHTML}
                        
                        <h2 style="font-family: var(--font-serif), serif; font-size: 42px; line-height: 1.25; margin: 0 0 35px 0; font-weight: 700;">${title}</h2>
                        <p style="font-family: var(--font-sans), sans-serif; font-size: 32px; color: #333333; line-height: 1.55; margin: 0; overflow: hidden;">${desc}</p>
                    </div>
                    
                    <div style="display: flex; justify-content: center; align-items: center; height: 50px; color: #666666; font-family: var(--font-mono), monospace; font-size: 24px; font-weight: 600; margin-bottom: 12px">
                        <i class="fab fa-github" style="margin-right: 14px; font-size: 30px;"></i>sivasubramoniam-js/daily-tech-news
                    </div>
                `;

                // Inject strictly for the backend Canvas engine to target
                document.body.appendChild(poster);

                // Delay execution momentarily to guarantee font-families append cleanly to the injected DOM graph
                setTimeout(() => {
                    html2canvas(poster, {
                        useCORS: true,
                        scale: 1.5, // 1080x1350 output upscales to gorgeous 1620x2025 photo
                        backgroundColor: '#f9f8f4',
                        logging: false
                    }).then(canvas => {
                        const link = document.createElement('a'); link.download = `tech-news-highlight.png`;
                        link.href = canvas.toDataURL('image/png', 1.0);
                        link.click();

                        poster.remove(); // Safely destroy the phantom DOM element
                        icon.className = originalIconClass; // Restore download UI
                    }).catch(err => {
                        console.error("DOM Image Render failed", err);
                        poster.remove();
                        icon.className = originalIconClass;
                        alert("Sorry! Failed to render the card as an image.");
                    });
                }, 150); // Provide enough time for image processing and webfonts rendering
            };

            // Dynamically load html2canvas to save initial page load bandwidth
            if (typeof html2canvas === 'undefined') {
                const script = document.createElement('script');
                script.src = "https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js";
                script.onload = renderAndDownload;
                document.head.appendChild(script);
            } else {
                renderAndDownload();
            }
        }
        // Set dynamic masthead date
        const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
        document.getElementById('dateDisplay').textContent = new Date().toLocaleDateString('en-US', options);

        const RSS_FEEDS = [
            // General Tech & Startups
            { url: 'https://techcrunch.com/feed/', category: 'TechCrunch' },
            { url: 'https://news.ycombinator.com/rss', category: 'Hacker News' },
            { url: 'https://arstechnica.com/feed/', category: 'Ars Technica' },
            { url: 'https://www.theverge.com/tech/rss/index.xml', category: 'The Verge' },
            { url: 'https://feeds.feedburner.com/TechCrunch/startups', category: 'Startups' },

            // Frontend & Design
            { url: 'https://css-tricks.com/feed/', category: 'Frontend' },
            { url: 'https://www.smashingmagazine.com/feed/', category: 'Design' },
            { url: 'https://frontendfoc.us/rss', category: 'UI/UX Focus' },
            { url: 'https://dev.to/feed/tag/css', category: 'CSS Mastery' },
            { url: 'https://dev.to/feed/tag/react', category: 'ReactJS' },

            // Backend & Architecture
            { url: 'https://dev.to/feed/tag/backend', category: 'Backend' },
            { url: 'https://javascriptweekly.com/rss/25xldlji', category: 'JavaScript' },
            { url: 'https://dev.to/feed/tag/python', category: 'Python' },
            { url: 'https://dev.to/feed/tag/go', category: 'Golang' },
            { url: 'https://dev.to/feed/tag/rust', category: 'Rust' },

            // Cloud & Databases
            { url: 'https://aws.amazon.com/blogs/aws/feed/', category: 'AWS Cloud' },
            { url: 'https://azure.microsoft.com/en-us/blog/feed/', category: 'Azure' },
            { url: 'https://dev.to/feed/tag/database', category: 'Database' },
            { url: 'https://www.mongodb.com/blog/rss', category: 'MongoDB' },
            { url: 'https://planet.postgresql.org/rss20.xml', category: 'Postgres' },

            // AI & Machine Learning
            { url: 'https://bair.berkeley.edu/blog/feed.xml', category: 'Berkeley AI' },
            { url: 'https://towardsdatascience.com/feed', category: 'Data Science' },
            { url: 'https://machinelearningmastery.com/blog/feed/', category: 'Machine Learning' },
            { url: 'https://dev.to/feed/tag/ai', category: 'AI Trends' },

            // Cybersecurity & Testing
            { url: 'https://thehackernews.com/feeds/posts/default', category: 'Cybersecurity' },
            { url: 'https://krebsonsecurity.com/feed/', category: 'Security' },
            { url: 'https://www.darkreading.com/rss.xml', category: 'Dark Reading' },
            { url: 'https://dev.to/feed/tag/testing', category: 'QA Testing' },

            // Engineering Blogs & Open Source
            { url: 'https://github.blog/feed/', category: 'GitHub' },
            { url: 'https://netflixtechblog.com/feed', category: 'Netflix Eng' },
            { url: 'https://engineering.fb.com/feed/', category: 'Meta Eng' },
            { url: 'https://changelog.com/master/feed', category: 'Open Source' },
            { url: 'https://dev.to/feed/tag/opensource', category: 'OSS Community' },
            
            // Metaverse & Web3
            { url: 'https://dev.to/feed/tag/metaverse', category: 'Metaverse' },
            { url: 'https://dev.to/feed/tag/web3', category: 'Web3' }
        ];

        async function fetchNews() {
            try {
                const container = document.getElementById('news-feed');
                container.innerHTML = '<div class="loading-text">Synchronizing Global RSS Feeds...</div>';

                const fetchPromises = RSS_FEEDS.map(async (feed) => {
                    try {
                        const rs = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(feed.url)}`);
                        if (!rs.ok) return [];
                        const json = await rs.json();
                        if (json.status !== 'ok') return [];
                        
                        return json.items.slice(0, 3).map(item => { // top 3 from each category
                            // Universal Image Extractor
                            let img = item.thumbnail || (item.enclosure && item.enclosure.link);
                            if (!img) {
                                const imgMatch = item.description.match(/<img[^>]+src="([^">]+)"/);
                                if (imgMatch) img = imgMatch[1];
                            }
                            if (!img) {
                                // Default tech placeholder
                                img = 'https://images.unsplash.com/photo-1518770660439-4636190af475?auto=format&fit=crop&q=80';
                            }
                            
                            // Safe HTML stripper
                            let desc = item.description.replace(/<[^>]*>?/gm, '').trim();
                            // Decode basic HTML entities to pure text to prevent &lt; bugs etc
                            const txt = document.createElement("textarea");
                            txt.innerHTML = desc;
                            desc = txt.value.substring(0, 180) + '...';

                            return {
                                title: `[${feed.category}] ${item.title}`,
                                description: desc,
                                link: item.link,
                                pubDate: new Date(item.pubDate.replace(/-/g, '/')), // Safely parse Safari dates
                                image: img
                            };
                        });
                    } catch (err) {
                        return [];
                    }
                });

                let data = (await Promise.all(fetchPromises)).flat();
                
                // Sort chronologically by newest available dispatches
                data = data.sort((a,b) => b.pubDate - a.pubDate);
                
                if (data.length === 0) throw new Error("No RSS data harvested");

                container.innerHTML = '';
                const marqueeText = document.getElementById('marqueeText');
                marqueeText.textContent = ''; // clear initial

                data.forEach((item, index) => {
                    let cardClass = 'card-regular';

                    if (index === 0) {
                        cardClass = 'card-featured';
                    } else if (index < 5) {
                        cardClass = 'card-wide';
                    }

                    if (index < data.length - 1) {
                        marqueeText.textContent += item.title + '  ///  ';
                    } else {
                        marqueeText.textContent += item.title;
                    }

                    const animDelay = (index % 10) * 0.1;
                    const wordCount = item.description ? item.description.split(/\s+/).length : 0;
                    const readTime = Math.max(1, Math.ceil(wordCount / 200));

                    const cardHTML = `
                        <a href="${item.link}" target="_blank" class="news-card ${cardClass}" style="animation-delay: ${animDelay}s">
                            ${item.image ? `
                                <div class="news-image-wrapper">
                                    <img src="${item.image}" class="news-image" alt="Article image" loading="lazy">
                                </div>
                            ` : `<div class="news-image-wrapper" style="background:#222;display:flex;align-items:center;justify-content:center;color:#fff;font-family:var(--font-mono)"><i class="fas fa-satellite-dish fa-2x"></i></div>`}
                            <div class="news-content">
                                <div class="news-meta">
                                    <span class="action-icons" style="font-size: 1.1rem;">
                                        <i class="fas fa-copy" title="Copy to clipboard" style="margin-right: 10px; cursor: pointer;" onclick="copyToClipboard(event)"></i>
                                        <i class="fas fa-volume-up" title="Text to Speech" style="cursor: pointer;" onclick="speakText(event)"></i>
                                        <i class="fas fa-download" title="Download as image" id="${index}" style="cursor: pointer;" onclick="downloadAsImage(event)"></i>
                                    </span>
                                    <span>${readTime} MIN READ</span>
                                </div>
                                <h2 class="news-title">
                                    <span class="title-hover-effect">${item.title}</span>
                                </h2>
                                <p class="news-desc">${item.description}</p>
                            </div>
                        </a>
                    `;
                    container.innerHTML += cardHTML;
                });
                // marquee scrolling time calculation
                const marquee = document.querySelector('.marquee');
                const marqueeContent = document.querySelector('.marquee-content');
                const marqueeWidth = marquee.offsetWidth;
                const marqueeSpeed = 8; // Adjust speed for longer RSS titles
                const marqueeTime = marqueeWidth / marqueeSpeed;
                marqueeContent.style.animationDuration = marqueeTime + 's';
            } catch (error) {
                console.error('Error fetching RSS network:', error);
                document.getElementById('news-feed').innerHTML = '<div class="loading-text" style="color:var(--accent);">Global RSS Synchronization Failed. Please verify uplinks.</div>';
            }
        }

        // Initialize
        fetchNews();
    </script>

    <!-- Google Translate API Scripts -->
    <script type="text/javascript">
        function googleTranslateElementInit() {
            // Force Google API to load the preferred language natively by injecting its expected cookie
            let savedLang = null;
            try { savedLang = localStorage.getItem('custom_lang'); } catch (e) { }
            if (!savedLang) {
                const match = document.cookie.match(/(^|;) ?custom_lang=([^;]*)(;|$)/);
                if (match) savedLang = match[2];
            }
            if (savedLang) {
                document.cookie = `googtrans=/en/${savedLang}; path=/`;
                document.cookie = `googtrans=/en/${savedLang}; domain=${location.hostname}; path=/`;
            }
            console.log("Saved lang : ", savedLang)

            new google.translate.TranslateElement({
                autoDisplay: true
            }, 'google_translate_element');
        }

        // Add a watcher purely to store new language selections going forward
        const observer = new MutationObserver(() => {
            const select = document.querySelector('.goog-te-combo');
            if (select && !select.dataset.listenerAdded) {
                select.dataset.listenerAdded = "true";

                // Because local file:/// paths silently reject cookies, explicitly command the UI to translate
                let savedLang = null;
                try { savedLang = localStorage.getItem('custom_lang'); } catch (e) { }

                if (savedLang) {
                    select.value = savedLang;
                    select.dispatchEvent(new Event('change')); // Force API to translate

                    // Backup execution in case Google script has latency generating the <option> elements
                    setTimeout(() => {
                        if (select.value !== savedLang) {
                            select.value = savedLang;
                            select.dispatchEvent(new Event('change'));
                        }
                    }, 500);
                }

                select.addEventListener('change', (e) => {
                    if (e.target.value) {
                        try { localStorage.setItem('custom_lang', e.target.value); } catch (err) { }
                        document.cookie = `custom_lang=${e.target.value}; path=/; max-age=31536000`; // 1 year
                        document.cookie = `googtrans=/en/${e.target.value}; path=/`; // Explicitly assist Google API
                        console.log("Stored language selection:", e.target.value);
                    }
                });
            }
        });
        observer.observe(document.body, { childList: true, subtree: true });

    </script>
    <script type="text/javascript"
        src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
</body>
