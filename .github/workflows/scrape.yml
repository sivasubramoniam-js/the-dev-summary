name: Tech News Engine

on:
  push:
    branches:
      - main
  schedule:
    - cron: '30 0,12 * * *' # 6am and 6pm IST (00:30 and 12:30 UTC)
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install feedparser requests beautifulsoup4 lxml Pillow

      - name: Run Scraper
        run: python scraper.py

      - name: Commit and Push
        run: |
          git config --global user.name "sivasubramoniam-js"
          git config --global user.email "122598293+sivasubramoniam-js@users.noreply.github.com"
          git add news.json || true
          if ls feeds/*.json 1> /dev/null 2>&1; then git add feeds/*.json; fi
          git commit -m "daily update $(TZ='Asia/Kolkata' date +'%d-%b-%Y %I %P')" || echo "No changes"
          git push