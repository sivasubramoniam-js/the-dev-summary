        html {

        :root {

            --text-muted: #5a5a5a;
            --accent: #d32f2f;

            --border-color: #111111;

            /* Typography Variables */
            --font-mono: 'JetBrains Mono', monospace;
            --font-sans: 'Inter', sans-serif;
            --font-serif: 'Lora', serif;
            --font-display: 'Playfair Display', serif;

        * {

            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-sans);
            background-color: var(--bg-page);
            color: var(--text-main);
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            overflow-x: hidden;
            width: 100%;
        }

        /* ---------------- MASTHEAD ---------------- */
        .masthead {
            max-width: 1400px;
            margin: 0 auto;
            border-bottom: 3px solid var(--border-color);
            padding: 20px;
            text-align: center;
        }

        #dateDisplay {
            display: flex;
            align-items: center;
        }

        .masthead-meta {
            display: flex;
            justify-content: space-between;
            font-family: var(--font-mono);
            font-size: 0.75rem;
            text-transform: uppercase;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 15px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .masthead h1 {
            font-family: var(--font-display);
            font-size: clamp(3rem, 10vw, 7rem);
            letter-spacing: -0.02em;
            text-transform: uppercase;
            color: var(--text-main);
        }

        .masthead p {
            font-family: var(--font-serif);
            font-style: italic;
            font-size: 1.2rem;
            color: var(--text-muted);
        }

        /* ---------------- NAVIGATION ---------------- */
        .sticky-nav {
            position: sticky;
            top: 0;
            background-color: var(--bg-page);
            border-bottom: 1px solid var(--border-color);
            z-index: 100;
        }

        .nav-links {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: center;
            gap: 3rem;
            padding: 15px 20px;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--text-main);
            font-family: var(--font-mono);
            font-size: 0.85rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            transition: color 0.3s;
        }

        .nav-links a i {
            margin-right: 8px;
            font-size: 1rem;
        }

        .nav-links a:hover,
        .nav-links a.active {
            color: var(--accent);
        }

        /* ---------------- MAIN FEED ---------------- */
        main {
            max-width: 1400px;
            margin: 40px auto;
            padding: 0 20px;
        }

        /* ---------------- GRID LAYOUT ---------------- */
        #news-feed {
            display: grid;
            grid-template-columns: repeat(12, 1fr);
            gap: 40px;
            min-height: 65vh;
        }

        .news-card {
            display: flex;
            flex-direction: column;
            text-decoration: none;
            color: inherit;
            group: card;
            padding-bottom: 25px;
            border-bottom: 1px solid var(--border-color);

            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        /* Responsive Grid Spans */
        .card-featured {
            grid-column: span 12;
            flex-direction: row;
            gap: 40px;
            border-bottom: 3px solid var(--border-color);
            padding-bottom: 40px;
        }

        .card-regular {
            grid-column: span 4;
        }

        .card-side {
            grid-column: span 3;
            border-left: 1px solid var(--border-color);
            padding-left: 25px;
        }

        .card-wide {
            grid-column: span 6;
        }

        /* Image Display */
        .news-image-wrapper {
            width: 100%;
            height: 220px;
            overflow: hidden;
            margin-bottom: 20px;
            background: #e0e0e0;
            position: relative;
        }

        .card-featured .news-image-wrapper {
            flex: 3;
            height: 480px;
            margin-bottom: 0;
        }

        .card-featured .news-content {
            flex: 2;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .news-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: filter 0.6s ease, transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .news-card:hover .news-image {
            transform: scale(1.05);
            /* Subtle zoom */
        }

        /* Article Meta & Content */
        .news-meta {
            font-family: var(--font-mono);
            font-size: 1rem;
            color: var(--accent);
            text-transform: uppercase;
            font-weight: 700;
            margin-bottom: 12px;
            letter-spacing: 0.5px;
            display: flex;
            justify-content: space-between;
        }

        .news-title {
            font-family: var(--font-serif);
            font-size: 1.6rem;
            font-weight: 700;
            line-height: 1.2;
            margin: 0 0 12px 0;
            color: var(--text-main);
            overflow-wrap: break-word;
            word-wrap: break-word;
        }

        /* Underline Animation Effect */
        .title-hover-effect {
            background-image: linear-gradient(var(--text-main), var(--text-main));
            background-size: 0% 1px;
            background-position: left bottom;
            background-repeat: no-repeat;
            transition: background-size 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .news-card:hover .title-hover-effect {
            background-size: 100% 1px;
        }

        .news-desc {
            font-size: 1rem;
            color: var(--text-muted);
            line-height: 1.6;
            margin: 0;
        }

        /* Footer */
        footer {
            border-top: 3px solid var(--border-color);
            padding: 40px 20px;

            font-family: var(--font-mono);
            font-size: 0.8rem;

            font-family: var(--font-mono);

            }

            visibility: hidden !important;

        .goog-text-highlight {
            background-color: transparent !important;
            border: none !important;
            box-shadow: none !important;
        }

        .marquee {
            overflow: hidden;
            white-space: nowrap;
            background-color: var(--bg-page);
            border-top: 1px solid var(--border-color);
            border-bottom: 1px solid var(--border-color);
            padding: 10px 0;
            width: 100%;
            max-width: 1400px;
            margin: 0 auto;
        }

        .marquee-content {
            display: inline-block;
            padding-left: 100%;
            animation: marquee linear infinite;
            cursor: pointer;
        }

        .marquee:hover .marquee-content {
            animation-play-state: paused;
        }

        .marquee-item {
            margin-right: 10px;
            color: var(--text-main);
            text-decoration: none;
            font-family: var(--font-mono);
            font-weight: 700;
            text-transform: uppercase;
            font-size: 0.8rem;
            transition: color 0.2s;
        }

        .marquee-item:hover {
            color: var(--accent);
        }

        @keyframes marquee {
            0% {
                transform: translateX(0%);
            }

            100% {
                transform: translateX(-100%);
            }
        }

        .category-nav,
        .date-filter-nav {
            position: sticky;
            top: 0;
            background-color: var(--bg-page);
            border-top: 1px solid var(--border-color);
            border-bottom: 1px solid var(--border-color);
            z-index: 100;
            padding: 8px 0;
        }

        .category-nav {
            overflow-x: auto;
            white-space: nowrap;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
            margin: 0 auto;
            max-width: 1400px;
        }

        .category-nav::-webkit-scrollbar {
            display: none;
        }

        .category-list {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            gap: 10px;
            padding: 0 20px;
            list-style: none;
        }

        .category-item {
            font-family: var(--font-mono);
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            padding: 6px 14px;
            cursor: pointer;
            border: 1px solid transparent;
            transition: all 0.2s;
            color: var(--text-muted);
            flex-shrink: 0;
        }

        .category-item:hover {
            color: var(--text-main);
        }

        .category-item.active {
            border-color: var(--border-color);
            color: var(--accent);
            background: rgba(0, 0, 0, 0.03);
        }

        .category-item.saved-trigger {
            border-color: var(--accent);
            color: var(--accent);
        }

        .category-item.saved-trigger.active {
            background-color: var(--accent);
            color: white;
        }



        .read-more {
            color: var(--accent);
            cursor: pointer;
            font-weight: 700;
            text-transform: uppercase;
            font-size: 0.75rem;
            font-family: var(--font-mono);
            margin-left: 5px;
            border-bottom: 1px solid transparent;
            transition: border-color 0.2s;
        }

        .read-more:hover {
            border-bottom-color: var(--accent);
        }


        /* Responsive Design */
        @media (max-width: 1200px) {
            .card-featured .news-image-wrapper {
                height: 400px;
            }

            .card-regular {
                grid-column: span 6;
            }

            .card-side {
                grid-column: span 6;
                border-left: none;
                padding-left: 0;
            }
        }

        @media (max-width: 900px) {
            .masthead h1 {
                font-size: 4.5rem;
            }

            .card-featured {
                flex-direction: column;
                gap: 20px;
            }

            .card-featured .news-image-wrapper {
                height: 350px;
            }

            .nav-links {
                gap: 1.5rem;
            }
        }

        @media (max-width: 768px) {
            .masthead h1 {
                font-size: 2.5rem;
            }

            .masthead p {
                font-size: 1rem;
            }

            .masthead-meta {
                flex-direction: column;
                gap: 10px;
                align-items: center;
            }

            .nav-links {
                flex-wrap: wrap;
                justify-content: center;
                gap: 1rem;
            }

            .nav-links a {
                font-size: 0.75rem;
            }

            .card-regular,
            .card-side,
            .card-wide,
            .card-featured {
                grid-column: span 12;
            }

            .news-title {
                font-size: 2rem;
            }

            #news-feed {
                gap: 30px;
            }

            .dialog-content h2 {
                font-size: 1.5rem;
            }

            .dialog-desc {
                font-size: 0.75rem;
            }
        }

        @media (max-width: 480px) {

            header h1 {
                margin-top: 12px;
            }

            .masthead h1 {
                font-size: 1.5rem;
            }

            .masthead p {
                font-size: 0.9rem;
            }

            .masthead-meta {
                flex-direction: column;
                gap: 10px;
                align-items: center;
            }

            .nav-links {
                flex-wrap: wrap;
                justify-content: center;
                gap: 1rem;
            }

            .nav-links a {
                font-size: 0.625rem;
            }

            .card-regular,
            .card-side,
            .card-wide,
            .card-featured {
                grid-column: span 12;
            }

            .news-desc {
                font-size: 0.75rem;
            }

            #news-feed {
                gap: 30px;
            }

            .news-title {
                font-size: 1.25rem;
            }

            .news-meta {
                font-size: 0.75rem;
            }
        }

        /* ---------------- QUICK TOUR ---------------- */
        .tour-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.75);
            z-index: 2000;
            display: none;
            backdrop-filter: blur(4px);
            transition: opacity 0.3s ease;
        }

        .tour-highlight {
            position: relative;
            z-index: 2002 !important;
            /* Higher than secondary */
            background: var(--bg-page) !important;
            box-shadow: 0 0 0 10px var(--bg-page), 0 0 40px rgba(0, 0, 0, 0.5) !important;
            border-radius: 4px;
            pointer-events: none;
            opacity: 1 !important;
            animation: none !important;
            visibility: visible !important;
            overflow: visible !important;
        }

        .tour-highlight-secondary {
            position: relative;
            z-index: 2001 !important;
            opacity: 1 !important;
            animation: none !important;
            visibility: visible !important;
            pointer-events: none;
        }

        .tour-highlight-secondary img {
            filter: blur(5px);
            opacity: 0.3;
        }

        .tour-tooltip {
            position: fixed;
            background: var(--bg-page);
            color: var(--text-main);
            padding: 25px;
            border: 2px solid var(--border-color);
            box-shadow: 10px 10px 0px var(--border-color);
            z-index: 2002;
            max-width: 320px;
            display: none;
            flex-direction: column;
            gap: 15px;
            animation: tourPop 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes tourPop {
            from {
                transform: scale(0.9);
                opacity: 0;
            }

            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        .tour-tooltip h3 {
            font-family: var(--font-display);
            font-size: 1.5rem;
            margin-bottom: 5px;
            color: var(--accent);
        }

        .tour-tooltip p {
            font-family: var(--font-serif);
            font-size: 1rem;
            line-height: 1.5;
        }

        .tour-actions {
            display: flex;
            justify-content: space-between;
            margin-top: 10px;
        }

        .tour-btn {
            background: var(--text-main);
            color: var(--bg-page);
            border: none;
            padding: 8px 15px;
            font-family: var(--font-mono);
            font-size: 0.75rem;
            text-transform: uppercase;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
        }

        .tour-btn:hover {
            background: var(--accent);
        }

        .tour-btn.secondary {
            background: transparent;
            color: var(--text-muted);
            border: 1px solid #ccc;
        }
    </style>
</head>

<body>

    <header class="masthead">
        <div class="masthead-meta">
            <span id="dateDisplay"></span>
            <div style="display: flex; gap: 15px; align-items: center; justify-content: center; flex-wrap: wrap;">
                <div class="archive-container"
                    style="display: flex; align-items: center; gap: 8px; font-family: var(--font-mono); font-size: 0.75rem; border: 1px solid var(--border-color); padding: 4px 8px; font-weight: 700;">
                    <i class="fas fa-calendar-alt"></i>
                    <select id="archivePicker"
                        style="background: transparent; border: none; font-family: inherit; font-size: inherit; font-weight: inherit; color: inherit; cursor: pointer; outline: none; padding: 0;">
                        <option value="">Loading Archive...</option>
                    </select>
                </div>
                <span onclick="startTour()"
                    style="cursor: pointer; font-family: var(--font-mono); font-size: 0.75rem; border: 1px solid var(--border-color); padding: 4px 8px; font-weight: 700;"
                    title="Take a quick tour">
                    <i class="fas fa-route" style="margin-right: 5px;"></i>QUICK TOUR
                </span>
                <span id="google_translate_element"></span>
            </div>
        </div>
        <h1>The Dev Summary</h1>
        <p>Daily Tech News for Developers & Engineers</p>
    </header>

    <!-- scrolling marquee text based on the title of each news -->
    <div class="marquee">
        <div class="marquee-content">
            <span id="marqueeText"></span>
        </div>
    </div>

    <!-- Category Navigation Bar (Default) -->
    <nav class="category-nav" id="categoryNav">
        <ul class="category-list" id="categoryList">
            <!-- Categories will be injected here -->
        </ul>
    </nav>

    <main>
        <div id="news-feed">
            <div class="loading-text">Fetching the latest dispatches...</div>
        </div>
    </main>


    <footer>
        <p>The Dev Summary ©
            <script>document.write(new Date().getFullYear())</script> — Minimalist Tech Editorial by <a
                href="https://github.com/sivasubramoniam-js" target="_blank"
                style="text-decoration: none; color: white;">
                sivasubramoniam-js</a>
        </p>
        <span>Content curated from the global tech community</span>
    </footer>

    <script>
        // --- Quick Tour Manager ---
        const tourSteps = [
            {
                element: '.masthead h1',
                title: 'Welcome!',
                content: 'The Dev Summary is your daily minimalist editorial for everything happening in the tech world.',
                position: 'bottom'
            },
            {
                element: '#google_translate_element',
                title: 'Global Reach',
                content: 'Read news in your native language. Our system automatically adapts to your preference.',
                position: 'bottom'
            },
            {
                element: '.marquee',
                title: 'Live Wire',
                content: 'Stay updated with real-time scrolling headlines across all major tech categories.',
                position: 'bottom'
            },
            {
                element: '#categoryNav',
                title: 'Curated Topics',
                content: 'Filter the news by your area of interest—from AI to Engineering dispatches.',
                position: 'bottom'
            },
            {
                element: '#news-card-0',
                title: 'News Card',
                content: 'Each card contains the title, a short description, and a link to the original article.',
                position: 'bottom'
            },
            {
                element: '#news-card-0 .fa-copy',
                alsoHighlight: '#news-card-0',
                title: 'Copy Text',
                content: 'Quickly copy the news text to your clipboard for sharing.',
                position: 'bottom'
            },
            {
                element: '#news-card-0 .fa-bookmark',
                alsoHighlight: '#news-card-0',
                title: 'Save Article',
                content: 'Bookmark this dispatch to read it later in your "Saved Items" library.',
                position: 'bottom'
            }
        ];

        let currentTourStep = 0;

        function startTour() {
            currentTourStep = 0;
            document.body.insertAdjacentHTML('beforeend', `
                <div id="tourOverlay" class="tour-overlay"></div>
                <div id="tourTooltip" class="tour-tooltip">
                    <h3 id="tourTitle"></h3>
                    <p id="tourContent"></p>
                    <div class="tour-actions">
                        <button class="tour-btn secondary" onclick="endTour()">Skip</button>
                        <button class="tour-btn" id="tourNextBtn" onclick="nextTourStep()">Next</button>
                    </div>
                </div>
            `);
            document.getElementById('tourOverlay').style.display = 'block';
            showStep(0);
        }

        function showStep(index) {
            const step = tourSteps[index];
            const target = document.querySelector(step.element);
            const tooltip = document.getElementById('tourTooltip');
            const overlay = document.getElementById('tourOverlay');

            // If target not found yet (e.g. news cards still rendering), retry
            if (!target && index >= 4) {
                console.log(`Tour step ${index} target not found, retrying...`);
                // Force a re-render check if container is empty
                if (document.getElementById('news-feed').children.length === 0) {
                    fetchNews();
                }
                setTimeout(() => showStep(index), 800);
                return;
            }

            // Cleanup previous highlight
            document.querySelectorAll('.tour-highlight').forEach(el => el.classList.remove('tour-highlight'));

            if (target) {
                target.scrollIntoView({ behavior: 'smooth', block: 'center' });
                setTimeout(() => {
                    target.classList.add('tour-highlight');

                    // Support secondary highlight (like a parent card)
                    if (step.alsoHighlight) {
                        const secondary = document.querySelector(step.alsoHighlight);
                        if (secondary) secondary.classList.add('tour-highlight-secondary');
                    }

                    const rect = target.getBoundingClientRect();

                    tooltip.style.display = 'flex';
                    document.getElementById('tourTitle').textContent = step.title;
                    document.getElementById('tourContent').textContent = step.content;
                    document.getElementById('tourNextBtn').textContent = index === tourSteps.length - 1 ? 'Finish' : 'Next';

                    // Position tooltip relative to viewport (fixed)
                    const padding = 20;
                    let top = 0;
                    let left = rect.left + (rect.width / 2) - (tooltip.offsetWidth / 2);

                    if (step.position === 'bottom') {
                        top = rect.bottom + padding;
                    } else {
                        top = rect.top - tooltip.offsetHeight - padding;
                    }

                    // Keep tooltip within viewport bounds
                    top = Math.max(10, Math.min(top, window.innerHeight - tooltip.offsetHeight - 10));
                    left = Math.max(10, Math.min(left, window.innerWidth - tooltip.offsetWidth - 10));

                    tooltip.style.top = top + 'px';
                    tooltip.style.left = left + 'px';

                    // Mobile adjustment
                    if (window.innerWidth < 768) {
                        tooltip.style.left = '10px';
                        tooltip.style.right = '10px';
                        tooltip.style.width = 'calc(100% - 20px)';
                        tooltip.style.maxWidth = 'none';
                    }
                }, 400);
            }
        }

        function nextTourStep() {
            currentTourStep++;
            if (currentTourStep < tourSteps.length) {
                showStep(currentTourStep);
            } else {
                endTour();
            }
        }

        function endTour() {
            document.getElementById('tourOverlay')?.remove();
            document.getElementById('tourTooltip')?.remove();
            document.querySelectorAll('.tour-highlight, .tour-highlight-secondary').forEach(el => {
                el.classList.remove('tour-highlight');
                el.classList.remove('tour-highlight-secondary');
            });
        }

        // --- Global Action Handlers ---
        function copyToClipboard(event) {
            event.preventDefault();
            event.stopPropagation();

            const card = event.target.closest('.news-card');
            if (!card) return;

            // Extract dynamically rendered text directly from DOM using textContent which is immune to visibility/translation DOM wrapping quirks
            const title = card.querySelector('.news-title')?.textContent.trim() || '';
            const description = card.querySelector('.news-desc')?.textContent.trim() || '';
            const textToCopy = `${title} : ${description}`;

            navigator.clipboard.writeText(textToCopy).then(() => {
                const icon = event.target;
                const originalClass = icon.className;
                icon.className = 'fas fa-check text-green-500';
                icon.style.color = 'var(--text-main)';
                setTimeout(() => {
                    icon.className = originalClass;
                    icon.style.color = '';
                }, 2000);
            }).catch(err => console.error('Failed to copy: ', err));
        }

        function downloadAsImage(event) {
            event.preventDefault();
            event.stopPropagation();

            const icon = event.target;
            const originalIconClass = icon.className;
            icon.className = "fas fa-spinner fa-spin"; // Show loading state

            const card = event.target.closest('.news-card');

            const renderAndDownload = async () => {
                // Extract the exact textual and visual content asynchronously
                const imgEl = card.querySelector('.news-image');
                const imgSrc = imgEl ? imgEl.src : null;
                const title = card.querySelector('.news-title').textContent.trim();
                const desc = card.querySelector('.news-desc').textContent.trim();
                const dateEl = document.getElementById('dateDisplay');
                const dateStr = dateEl ? dateEl.textContent.trim() : "The Dev Summary";

                // Helper to convert image URL to base64 data URL
                const toBase64 = async (url) => {
                    try {
                        const resp = await fetch(url);
                        const blob = await resp.blob();
                        return await new Promise((resolve, reject) => {
                            const reader = new FileReader();
                            reader.onloadend = () => resolve(reader.result);
                            reader.onerror = reject;
                            reader.readAsDataURL(blob);
                        });
                    } catch (e) {
                        console.error('Base64 conversion failed', e);
                        return url; // fallback to original URL if conversion fails
                    }
                };

                const imgData = imgSrc ? await toBase64(`https://images.weserv.nl/?url=${encodeURIComponent(imgSrc)}`) : null;

                // Programmatically construct a perfectly structured exact 4:5 offline poster div (1080x1350 resolution)
                const poster = document.createElement('div');
                poster.style.position = 'absolute'; // Position absolute avoids viewport issues during scaling
                poster.style.top = '-9999px'; // Render entirely off-screen
                poster.style.left = '-9999px';
                poster.style.width = '1080px';
                poster.style.height = '1350px';
                poster.style.backgroundColor = '#f9f8f4'; // Premium editorial paper white
                poster.style.padding = '80px 80px 10px 80px'; // 10px exactly at the bottom precisely locks the footer!
                poster.style.boxSizing = 'border-box';
                poster.style.display = 'flex';
                poster.style.flexDirection = 'column';
                poster.style.color = 'var(--text-main)';
                poster.style.zIndex = '-100';

                // Safely format Image Block using base64 data URL to avoid CORS issues
                let imgHTML = '';
                if (imgData) {
                    imgHTML = `
                        <div style="width: 100%; height: 500px; border-radius: 4px; margin-bottom: 40px; border: 1px solid rgba(0,0,0,0.1); background-color: #e0e0e0; background-image: url('${imgData}'); background-size: cover; background-position: center; background-repeat: no-repeat;">
                        </div>
                    `;
                }

                // Build immaculate HTML Layout natively
                poster.innerHTML = `
                    <div style="flex-grow: 1; display: flex; flex-direction: column;">
                        <div style="display: flex; justify-content: space-between; align-items: flex-end; border-bottom: 3px solid var(--border-color); padding-bottom: 25px; margin-bottom: 40px;">
                            <div style="font-family: var(--font-display), serif; font-size: 40px; text-transform: uppercase; font-weight: 800; line-height: 1; letter-spacing: -0.02em;">The Dev Summary</div>
                            <div style="font-family: var(--font-mono), monospace; font-size: 22px; color: var(--text-muted); text-transform: uppercase;">${dateStr}</div>
                        </div>
                        
                        ${imgHTML}
                        
                        <h2 style="font-family: var(--font-serif), serif; font-size: 42px; line-height: 1.25; margin: 0 0 35px 0; font-weight: 700;">${title}</h2>
                        <p style="font-family: var(--font-sans), sans-serif; font-size: 32px; color: #333333; line-height: 1.55; margin: 0; overflow: hidden;">${desc}</p>
                    </div>
                    
                    <div style="display: flex; justify-content: center; align-items: center; height: 50px; color: #666666; font-family: var(--font-mono), monospace; font-size: 20px; font-weight: 600; margin-bottom: 12px">
                        <span style="margin-right: 25px;"><i class="fab fa-github" style="margin-right: 8px;"></i>sivasubramoniam-js/the-dev-summary</span>
                        <span><i class="fas fa-globe" style="margin-right: 8px;"></i>sivasubramoniam-js.github.io/the-dev-summary</span>
                    </div>
                `;

                // Inject strictly for the backend Canvas engine to target
                document.body.appendChild(poster);

                // Delay execution momentarily to guarantee font-families append cleanly to the injected DOM graph
                setTimeout(() => {
                    html2canvas(poster, {
                        useCORS: true,
                        scale: 1.5,
                        backgroundColor: '#f9f8f4',
                        logging: false
                    }).then(canvas => {
                        const link = document.createElement('a'); link.download = `tech-news-highlight.png`;
                        link.href = canvas.toDataURL('image/png', 1.0);
                        link.click();
                        poster.remove(); // Safely destroy the phantom DOM element
                        icon.className = originalIconClass; // Restore download UI
                    }).catch(err => {
                        console.error("DOM Image Render failed", err);
                        poster.remove();
                        icon.className = originalIconClass;
                        alert("Sorry! Failed to render the card as an image.");
                    });
                }, 150);
            };

            // Dynamically load html2canvas to save initial page load bandwidth
            if (typeof html2canvas === 'undefined') {
                const script = document.createElement('script');
                script.src = "https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js";
                script.onload = renderAndDownload;
                document.head.appendChild(script);
            } else {
                renderAndDownload();
            }
        }

        // Set dynamic masthead date
        const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
        const dateStr = new Date().toLocaleDateString('en-US', options);
        document.getElementById('dateDisplay').textContent = dateStr;

        // Categories Configuration
        let categories = [];
        let currentCategory = '';
        let allNewsData = []; // Store the full list for local filtering
        let currentDisplayedData = []; // Store currently visible news for dialog lookup
        let isInitialLoad = true; // Flag to prevent scroll on first load

        async function initCategoryNav() {
            // Dynamically extract unique categories from the news data
            const uniqueCategories = new Set();
            allNewsData.forEach(item => {
                let cat = item.category || 'Tech';
                if (cat.toLowerCase() === 'general tech') cat = 'Tech';
                uniqueCategories.add(cat);
            });

            // Sort alphabetically
            categories = Array.from(uniqueCategories).sort((a, b) => a.localeCompare(b));

            const list = document.getElementById('categoryList');
            list.innerHTML = '';

            // Add Saved Items trigger
            const savedLi = document.createElement('li');
            savedLi.className = `category-item saved-trigger ${currentCategory === 'Saved Items' ? 'active' : ''}`;
            savedLi.textContent = 'Saved Items';
            savedLi.dataset.category = 'Saved Items';
            savedLi.onclick = () => filterByCategory('Saved Items');
            list.appendChild(savedLi);

            categories.forEach(cat => {
                const li = document.createElement('li');
                li.className = `category-item ${cat.toLowerCase() === currentCategory.toLowerCase() ? 'active' : ''}`;
                li.textContent = cat;
                li.dataset.category = cat;
                li.onclick = () => filterByCategory(cat);
                list.appendChild(li);
            });

            // Automatically trigger filtering for the default category
            if (currentFeedUrl.includes('news.json') && currentCategory !== 'Saved Items') {
                filterByCategory(currentCategory || (categories[0] || 'Tech'));
            }
        }

        async function filterByCategory(category) {
            currentCategory = category;

            // Update UI
            document.querySelectorAll('.category-item').forEach(el => {
                const itemCat = el.dataset.category || '';
                el.classList.toggle('active', itemCat.toLowerCase() === category.toLowerCase());
            });

            const container = document.getElementById('news-feed');
            container.innerHTML = '<div class="loading-text">Filtering...</div>';

            let dataToRender = [];

            if (category === 'Saved Items') {
                dataToRender = await db.getAllArticles();
                if (dataToRender.length === 0) {
                    container.innerHTML = '<div class="loading-text">No saved articles yet. Bookmark some interesting dispatches!</div>';
                    document.getElementById('marqueeText').textContent = 'Your library is empty.';
                    return;
                }

            } else {
                dataToRender = allNewsData.filter(item => {
                    let itemCat = item.category || 'Tech';
                    if (itemCat.toLowerCase() === 'general tech') itemCat = 'Tech';
                    return itemCat.toLowerCase() === category.toLowerCase();
                });
            }
            // blur the news feed
            container.style.filter = 'blur(5px)';
            // Small timeout to give visual feedback
            setTimeout(() => renderNews(dataToRender), 100);
        }

        // --- IndexedDB Utility ---
        const db = {
            name: 'DevSummaryDB',
            version: 1,
            store: 'savedArticles',

            open() {
                return new Promise((resolve, reject) => {
                    const request = indexedDB.open(this.name, this.version);
                    request.onupgradeneeded = (e) => {
                        const db = e.target.result;
                        if (!db.objectStoreNames.contains(this.store)) {
                            db.createObjectStore(this.store, { keyPath: 'link' });
                        }
                    };
                    request.onsuccess = (e) => resolve(e.target.result);
                    request.onerror = (e) => reject(e.target.error);
                });
            },

            async saveArticle(article) {
                const database = await this.open();
                return new Promise((resolve, reject) => {
                    const tx = database.transaction(this.store, 'readwrite');
                    tx.objectStore(this.store).put(article);
                    tx.oncomplete = () => resolve();
                });
            },

            async removeArticle(link) {
                const database = await this.open();
                return new Promise((resolve, reject) => {
                    const tx = database.transaction(this.store, 'readwrite');
                    tx.objectStore(this.store).delete(link);
                    tx.oncomplete = () => resolve();
                });
            },

            async getAllArticles() {
                const database = await this.open();
                return new Promise((resolve, reject) => {
                    const tx = database.transaction(this.store, 'readonly');
                    const request = tx.objectStore(this.store).getAll();
                    request.onsuccess = () => resolve(request.result);
                });
            },

            async isSaved(link) {
                const database = await this.open();
                return new Promise((resolve, reject) => {
                    const tx = database.transaction(this.store, 'readonly');
                    const request = tx.objectStore(this.store).get(link);
                    request.onsuccess = () => resolve(!!request.result);
                });
            }
        };

        async function toggleSave(event, index) {
            event.preventDefault();
            event.stopPropagation();
            const icon = event.currentTarget;
            const newsItem = currentDisplayedData[index];
            const isSaved = await db.isSaved(newsItem.link);

            if (isSaved) {
                await db.removeArticle(newsItem.link);
                icon.style.color = 'var(--text-muted)';
                icon.classList.replace('fas', 'far');
                if (currentCategory === 'Saved Items') {
                    filterByCategory('Saved Items');
                }
            } else {
                await db.saveArticle(newsItem);
                icon.style.color = 'crimson';
                icon.classList.replace('far', 'fas');
            }
        }

        // Fetch and render news
        // Fetch and render news
        const BASE_RAW_URL = 'https://raw.githubusercontent.com/sivasubramoniam-js/the-dev-summary/main/';
        let currentFeedUrl = 'news.json';

        async function initArchive() {
            const picker = document.getElementById('archivePicker');
            try {
                const response = await fetch('feeds/index.json');
                if (!response.ok) throw new Error('Index not found');
                const archive = await response.json();

                picker.innerHTML = '';
                archive.forEach((item, index) => {
                    const option = document.createElement('option');
                    option.value = 'feeds/' + item.file;
                    option.textContent = item.date;
                    if (index === 0) option.selected = true;
                    picker.appendChild(option);
                });

                picker.addEventListener('change', (e) => {
                    if (e.target.value) {
                        fetchNews(e.target.value);
                    }
                });
            } catch (error) {
                console.error('Archive index load failed:', error);
                picker.innerHTML = '<option value="news.json">Latest News</option>';
            }
        }

        async function fetchNews(url = 'news.json') {
            const container = document.getElementById('news-feed');
            container.innerHTML = '<div class="loading-text" style="color:var(--accent);">Opening the archives...</div>';

            try {
                const response = await fetch(url);
                if (!response.ok) throw new Error('Network response was not ok');
                const data = await response.json();

                allNewsData = data;
                if (url.includes('news.json')) {
                    initCategoryNav();
                }
                filterByCategory(currentCategory || (categories[0] || 'Tech'));
            } catch (error) {
                console.error('Error fetching news:', error);
                document.getElementById('news-feed').innerHTML = '<div class="loading-text" style="color:var(--accent);">Error connecting to the printing press. Please try again.</div>';
            }
        }

        function renderNews(data) {
            currentDisplayedData = data; // Update lookup reference
            const container = document.getElementById('news-feed');
            const marqueeText = document.getElementById('marqueeText');

            container.innerHTML = '';
            marqueeText.innerHTML = '';

            if (data.length === 0) {
                container.innerHTML = '<div class="loading-text">No articles found in this category.</div>';
                return;
            }

            const stripHTML = (html) => {
                const tmp = document.createElement("DIV");
                tmp.innerHTML = html;
                return tmp.textContent || tmp.innerText || "";
            };

            data.forEach(async (item, index) => {
                // Determine grid class based on index to create masonry/editorial layout
                let cardClass = 'card-regular';

                if (index === 0) {
                    cardClass = 'card-featured';
                } else if (index < 5) {
                    cardClass = 'card-wide';
                }

                // add title to marquee text
                const marqueeItem = document.createElement('span');
                marqueeItem.className = 'marquee-item';
                marqueeItem.textContent = item.title + (index < data.length - 1 ? ' | ' : '');
                marqueeItem.onclick = () => {
                    const card = document.getElementById(`news-card-${index}`);
                    if (card) {
                        card.scrollIntoView({ behavior: 'smooth', block: 'center' });
                        card.style.borderColor = 'var(--accent)';
                        setTimeout(() => card.style.borderColor = '', 2000);
                    }
                };
                marqueeText.appendChild(marqueeItem);

                // Stagger animation timing
                const animDelay = (index % 10) * 0.1;

                // Calculate reading time based on description length
                const wordCount = item.description ? item.description.split(/\s+/).length : 0;
                const readTime = Math.max(1, Math.ceil(wordCount / 200));

                let image_url = "";
                if (item.image) {
                    image_url = item.image.startsWith("https") ? item.image : BASE_RAW_URL + item.image;
                }



                const rawDesc = stripHTML(item.description || "");
                let displayDesc = rawDesc;
                let readMoreLink = "";
                if (displayDesc.length > 200) {
                    displayDesc = displayDesc.substring(0, 200);
                    readMoreLink = `<span class="read-more" onclick="window.open('${item.link}', '_blank')">...more</span>`;
                }

                const isSaved = await db.isSaved(item.link);
                const saveIconClass = isSaved ? 'fas' : 'far';
                const saveIconColor = isSaved ? 'crimson' : 'var(--text-muted)';

                const cardHTML = `
                    <article class="news-card ${cardClass}" id="news-card-${index}" style="animation-delay: ${animDelay}s">
                        ${item.image ? `
                            <div class="news-image-wrapper">
                                <img src="${image_url}" class="news-image" alt="${item.title}" loading="lazy">
                            </div>
                        ` : `<div class="news-image-wrapper" style="background:#222;display:flex;align-items:center;justify-content:center;color:#fff;font-family:var(--font-mono)"><i class="fas fa-newspaper fa-2x"></i></div>`}
                        <div class="news-content">
                            <div class="news-meta" style="margin-bottom: 6px;">
                                <span style="color: var(--accent); padding-right: 8px;">${item.category || 'Tech'}</span>
                                <span style="font-size: 0.8rem;"><span style="color: crimson; font-weight: 700;">Source:</span> <span style="color: var(--text-muted);">${item.source || 'General'}</span></span>
                            </div>
                            <div class="news-meta">
                                <span class="action-icons" style="font-size: 1.1rem; color: var(--text-muted);">
                                    <i class="fas fa-copy" title="Copy to clipboard" style="margin-right: 15px; cursor: pointer;" onclick="copyToClipboard(event)"></i>
                                    <i class="${saveIconClass} fa-bookmark" title="Save article" style="cursor: pointer; color: ${saveIconColor};" onclick='toggleSave(event, ${index})'></i>
                                </span>
                                <span style="color: var(--text-muted);">${readTime} MIN READ</span>
                            </div>
                            <h2 class="news-title">
                                <a href="${item.link}" style="text-decoration: none; color: inherit;" target="_blank" rel="noopener noreferrer">
                                    <span class="title-hover-effect">${item.title}</span>
                                </a>
                            </h2>
                            <p class="news-desc">${displayDesc}${readMoreLink}</p>
                        </div>
                    </article>
                `;
                container.insertAdjacentHTML('beforeend', cardHTML);
            });

            // Post-render actions
            if (!isInitialLoad) {
                const categoryNav = document.querySelector('.category-nav');
                const targetTop = categoryNav.getBoundingClientRect().top + window.scrollY - 10;
                window.scrollTo({ top: targetTop, behavior: 'smooth' });
            }
            container.style.filter = '';
            isInitialLoad = false;

            // marquee scrolling time calculation
            const marqueeContent = document.querySelector('.marquee-content');
            if (marqueeContent) {
                const totalScrollWidth = marqueeContent.scrollWidth;
                const pixelsPerSecond = 50;
                const marqueeTime = totalScrollWidth / pixelsPerSecond;
                marqueeContent.style.animationDuration = marqueeTime + 's';
            }
        }

        // Initialize
        initArchive();
        fetchNews();
    </script>

    <!-- Google Translate API Scripts -->
    <script type="text/javascript">
        function googleTranslateElementInit() {
            // Force Google API to load the preferred language natively by injecting its expected cookie
            let savedLang = null;
            try { savedLang = localStorage.getItem('custom_lang'); } catch (e) { }
            if (!savedLang) {
                const match = document.cookie.match(/(^|;) ?custom_lang=([^;]*)(;|$)/);
                if (match) savedLang = match[2];
            }
            if (savedLang) {
                document.cookie = `googtrans=/en/${savedLang}; path=/`;
                document.cookie = `googtrans=/en/${savedLang}; domain=${location.hostname}; path=/`;
            }
            console.log("Saved lang : ", savedLang)

            new google.translate.TranslateElement({
                autoDisplay: true
            }, 'google_translate_element');
        }

        // Add a watcher purely to store new language selections going forward
        const observer = new MutationObserver(() => {
            const select = document.querySelector('.goog-te-combo');
            if (select && !select.dataset.listenerAdded) {
                select.dataset.listenerAdded = "true";

                // Because local file:/// paths silently reject cookies, explicitly command the UI to translate
                let savedLang = null;
                try { savedLang = localStorage.getItem('custom_lang'); } catch (e) { }

                if (savedLang) {
                    select.value = savedLang;
                    select.dispatchEvent(new Event('change')); // Force API to translate

                    // Backup execution in case Google script has latency generating the <option> elements
                    setTimeout(() => {
                        if (select.value !== savedLang) {
                            select.value = savedLang;
                            select.dispatchEvent(new Event('change'));
                        }
                    }, 500);
                }

                select.addEventListener('change', (e) => {
                    if (e.target.value) {
                        try { localStorage.setItem('custom_lang', e.target.value); } catch (err) { }
                        document.cookie = `custom_lang=${e.target.value}; path=/; max-age=31536000`; // 1 year
                        document.cookie = `googtrans=/en/${e.target.value}; path=/`; // Explicitly assist Google API
                        console.log("Stored language selection:", e.target.value);
                    }
                });
            }
        });
        observer.observe(document.body, { childList: true, subtree: true });

    </script>
    <script type="text/javascript"
        src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
</body>
