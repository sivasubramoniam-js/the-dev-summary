<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Dev Summary | Realtime Feed</title>

    <!-- Top-tier Typography from Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;700&family=Lora:ital,wght@0,400;0,600;0,700;1,400&family=Playfair+Display:ital,wght@0,800;1,800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root {
            --bg-page: #f9f8f4;
            /* High-end magazine paper texture approximation */
            --text-main: #111111;
            --text-muted: #5a5a5a;
            --accent: #d32f2f;
            /* Deep editorial red */
            --border-color: #111111;

            /* Typography Variables */
            --font-mono: 'JetBrains Mono', monospace;
            --font-sans: 'Inter', sans-serif;
            --font-serif: 'Lora', serif;
            --font-display: 'Playfair Display', serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-sans);
            background-color: var(--bg-page);
            color: var(--text-main);
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* ---------------- MASTHEAD ---------------- */
        .masthead {
            max-width: 1400px;
            margin: 0 auto;
            border-bottom: 3px solid var(--border-color);
            padding: 20px;
            text-align: center;
        }

        .masthead-meta {
            display: flex;
            justify-content: space-between;
            font-family: var(--font-mono);
            font-size: 0.75rem;
            text-transform: uppercase;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 15px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .masthead h1 {
            font-family: var(--font-display);
            font-size: clamp(3rem, 10vw, 7rem);
            letter-spacing: -0.02em;
            text-transform: uppercase;
            color: var(--text-main);
        }

        .masthead p {
            font-family: var(--font-serif);
            font-style: italic;
            font-size: 1.2rem;
            color: var(--text-muted);
        }

        /* ---------------- NAVIGATION ---------------- */
        .sticky-nav {
            position: sticky;
            top: 0;
            background-color: var(--bg-page);
            border-bottom: 1px solid var(--border-color);
            z-index: 100;
        }

        .nav-links {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: center;
            gap: 3rem;
            padding: 15px 20px;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--text-main);
            font-family: var(--font-mono);
            font-size: 0.85rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            transition: color 0.3s;
        }

        .nav-links a i {
            margin-right: 8px;
            font-size: 1rem;
        }

        .nav-links a:hover,
        .nav-links a.active {
            color: var(--accent);
        }

        /* ---------------- MAIN FEED ---------------- */
        main {
            max-width: 1400px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .section-header {
            font-family: var(--font-mono);
            font-size: 1.1rem;
            text-transform: uppercase;
            font-weight: 700;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .section-header::after {
            content: "";
            flex: 1;
            height: 2px;
            background-color: var(--border-color);
        }

        /* ---------------- GRID LAYOUT ---------------- */
        #news-feed {
            display: grid;
            grid-template-columns: repeat(12, 1fr);
            gap: 40px;
        }

        .news-card {
            display: flex;
            flex-direction: column;
            text-decoration: none;
            color: inherit;
            group: card;
            padding-bottom: 25px;
            border-bottom: 1px solid var(--border-color);

            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        /* Responsive Grid Spans */
        .card-featured {
            grid-column: span 12;
            flex-direction: row;
            gap: 40px;
            border-bottom: 3px solid var(--border-color);
            padding-bottom: 40px;
        }

        .card-regular {
            grid-column: span 4;
        }

        .card-side {
            grid-column: span 3;
            border-left: 1px solid var(--border-color);
            padding-left: 25px;
        }

        .card-wide {
            grid-column: span 6;
        }

        /* Image Display */
        .news-image-wrapper {
            width: 100%;
            height: 220px;
            overflow: hidden;
            margin-bottom: 20px;
            background: #e0e0e0;
            position: relative;
        }

        .card-featured .news-image-wrapper {
            flex: 3;
            height: 480px;
            margin-bottom: 0;
        }

        .card-featured .news-content {
            flex: 2;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .news-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: filter 0.6s ease, transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .news-card:hover .news-image {
            transform: scale(1.05);
            /* Subtle zoom */
        }

        /* Article Meta & Content */
        .news-meta {
            font-family: var(--font-mono);
            font-size: 0.7rem;
            color: var(--accent);
            text-transform: uppercase;
            font-weight: 700;
            margin-bottom: 12px;
            letter-spacing: 0.5px;
            display: flex;
            justify-content: space-between;
        }

        .news-title {
            font-family: var(--font-serif);
            font-size: 1.6rem;
            font-weight: 700;
            line-height: 1.2;
            margin: 0 0 12px 0;
            color: var(--text-main);
        }

        .card-featured .news-title {
            font-size: 3rem;
            line-height: 1.1;
            margin-bottom: 20px;
        }

        .card-wide .news-title {
            font-size: 2rem;
        }

        /* Underline Animation Effect */
        .title-hover-effect {
            background-image: linear-gradient(var(--text-main), var(--text-main));
            background-size: 0% 1px;
            background-position: left bottom;
            background-repeat: no-repeat;
            transition: background-size 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .news-card:hover .title-hover-effect {
            background-size: 100% 1px;
        }

        .news-desc {
            font-family: var(--font-sans);
            font-size: 1rem;
            color: var(--text-muted);
            line-height: 1.6;
            margin: 0;
        }

        .card-featured .news-desc {
            font-size: 1.2rem;
        }

        .card-side .news-desc {
            font-size: 0.9rem;
        }

        /* Footer */
        footer {
            border-top: 3px solid var(--border-color);
            padding: 40px 20px;
            text-align: center;
            font-family: var(--font-mono);
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 60px;
            background: var(--text-main);
            color: var(--bg-page);
        }

        .loading-text {
            grid-column: span 12;
            text-align: center;
            padding: 80px 0;
            font-family: var(--font-mono);
            font-size: 1.2rem;
            color: var(--text-muted);
            text-transform: uppercase;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 0.5;
            }

            50% {
                opacity: 1;
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Responsive Design */
        @media (max-width: 1200px) {
            .card-featured .news-image-wrapper {
                height: 400px;
            }

            .card-regular {
                grid-column: span 6;
            }

            .card-side {
                grid-column: span 6;
                border-left: none;
                padding-left: 0;
            }
        }

        @media (max-width: 900px) {
            .masthead h1 {
                font-size: 4.5rem;
            }

            .card-featured {
                flex-direction: column;
                gap: 20px;
            }

            .card-featured .news-image-wrapper {
                height: 350px;
            }

            .nav-links {
                gap: 1.5rem;
            }
        }

        @media (max-width: 600px) {
            .masthead h1 {
                font-size: 3.5rem;
            }

            .masthead-meta {
                flex-direction: column;
                gap: 10px;
                align-items: center;
            }

            .nav-links {
                flex-wrap: wrap;
                justify-content: center;
            }

            .card-regular,
            .card-side,
            .card-wide,
            .card-featured {
                grid-column: span 12;
            }

            .card-featured .news-title {
                font-size: 2.2rem;
            }

            #news-feed {
                gap: 30px;
            }
        }

        /* Google Translate overriding styles */
        .goog-te-gadget {
            font-family: var(--font-mono) !important;
            font-size: 0px !important;
            /* Hide the Powered by Google text */
            color: transparent !important;
        }

        .goog-te-combo {
            font-family: var(--font-mono) !important;
            font-size: 0.75rem !important;
            border: 1px solid var(--border-color);
            background-color: var(--bg-page);
            color: var(--text-main);
            padding: 2px 5px;
            margin: 0 !important;
            text-transform: uppercase;
        }

        .goog-logo-link {
            display: none !important;
        }

        body {
            top: 0 !important;
            /* Remove the gap space google leaves at the top */
        }

        .skiptranslate iframe {
            display: none !important;
            /* Hide the google translate top bar */
        }

        .skiptranslate>span>a,
        .VIpgJd-ZVi9od-aZ2wEe-wOHMyf {
            display: none;
        }

        /* Disable Google Translate original text hover tooltip and highlight */
        .goog-tooltip,
        .goog-tooltip:hover,
        #goog-gt-tt,
        .goog-te-balloon-frame {
            display: none !important;
            visibility: hidden !important;
        }

        .goog-text-highlight {
            background-color: transparent !important;
            border: none !important;
            box-shadow: none !important;
        }

        .marquee {
            overflow: hidden;
            white-space: nowrap;
            background-color: var(--bg-page);
            border-top: 1px solid var(--border-color);
            border-bottom: 1px solid var(--border-color);
            padding: 10px 0;
            width: 100vw;
            max-width: 1400px;
            margin: 0 auto;
        }

        .marquee-content {
            display: inline-block;
            padding-left: 100%;
            animation: marquee linear infinite;
        }

        .marquee-content span {
            margin-right: 50px;
        }

        @keyframes marquee {
            0% {
                transform: translateX(0%);
            }

            100% {
                transform: translateX(-100%);
            }
        }

        .category-nav {
            position: sticky;
            top: 0;
            background-color: var(--bg-page);
            border-top: 1px solid var(--border-color);
            border-bottom: 1px solid var(--border-color);
            z-index: 100;
            overflow-x: auto;
            white-space: nowrap;
            padding: 8px 0;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
            /* Firefox */
        }

        .category-nav::-webkit-scrollbar {
            display: none;
            /* Chrome/Safari */
        }

        .category-list {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            gap: 10px;
            padding: 0 20px;
            list-style: none;
        }

        .category-item {
            font-family: var(--font-mono);
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            padding: 6px 14px;
            cursor: pointer;
            border: 1px solid transparent;
            transition: all 0.2s;
            color: var(--text-muted);
            flex-shrink: 0;
        }

        .category-item:hover {
            color: var(--text-main);
        }

        .category-item.active {
            border-color: var(--border-color);
            color: var(--accent);
            background: rgba(0, 0, 0, 0.03);
        }
    </style>
</head>

<body>

    <header class="masthead">
        <div class="masthead-meta">
            <span id="dateDisplay"></span>
            <div style="display: flex; gap: 15px; align-items: center; flex-wrap: wrap;">
                <select id="feedFilter" onchange="handleFilterChange(this.value)"
                    style="padding: 5px 10px; font-family: var(--font-mono); font-size: 0.8rem; border: 1px solid var(--border-color); background: var(--bg-page); outline: none; cursor: pointer; max-width: 300px;">
                    <option value="news.json">All Headlines (Top 250)</option>
                </select>
                <span id="google_translate_element"></span>
            </div>
        </div>
        <h1>The Dev Summary</h1>
        <p>Daily Tech News to keep you updated</p>
    </header>

    <!-- scrolling marquee text based on the title of each news -->
    <div class="marquee">
        <div class="marquee-content">
            <span id="marqueeText"></span>
        </div>
    </div>

    <!-- Category Navigation Bar -->
    <nav class="category-nav" id="categoryNav">
        <ul class="category-list" id="categoryList">
            <!-- Categories will be injected here -->
        </ul>
    </nav>

    <main>
        <div class="section-header">
            Top Technology Events
        </div>
        <div id="news-feed">
            <div class="loading-text">Fetching the latest dispatches...</div>
        </div>
    </main>

    <footer>
        <p>The Dev Summary ©
            <script>document.write(new Date().getFullYear())</script> — Minimalist Tech Editorial
        </p>
    </footer>

    <script>
        // Global Action Handlers
        function copyToClipboard(event) {
            event.preventDefault();
            event.stopPropagation();

            const card = event.target.closest('.news-card');
            if (!card) return;

            // Extract dynamically rendered text directly from DOM using textContent which is immune to visibility/translation DOM wrapping quirks
            const title = card.querySelector('.news-title')?.textContent.trim() || '';
            const description = card.querySelector('.news-desc')?.textContent.trim() || '';
            const textToCopy = `${title} : ${description}`;

            navigator.clipboard.writeText(textToCopy).then(() => {
                const icon = event.target;
                const originalClass = icon.className;
                icon.className = 'fas fa-check text-green-500';
                icon.style.color = 'var(--text-main)';
                setTimeout(() => {
                    icon.className = originalClass;
                    icon.style.color = '';
                }, 2000);
            }).catch(err => console.error('Failed to copy: ', err));
        }

        function downloadAsImage(event) {
            event.preventDefault();
            event.stopPropagation();

            const icon = event.target;
            const originalIconClass = icon.className;
            icon.className = "fas fa-spinner fa-spin"; // Show loading state

            const card = event.target.closest('.news-card');

            const renderAndDownload = async () => {
                // Extract the exact textual and visual content asynchronously
                const imgEl = card.querySelector('.news-image');
                const imgSrc = imgEl ? imgEl.src : null;
                const title = card.querySelector('.news-title').textContent.trim();
                const desc = card.querySelector('.news-desc').textContent.trim();
                const dateEl = document.getElementById('dateDisplay');
                const dateStr = dateEl ? dateEl.textContent.trim() : "The Dev Summary";

                // Helper to convert image URL to base64 data URL
                const toBase64 = async (url) => {
                    try {
                        const resp = await fetch(url);
                        const blob = await resp.blob();
                        return await new Promise((resolve, reject) => {
                            const reader = new FileReader();
                            reader.onloadend = () => resolve(reader.result);
                            reader.onerror = reject;
                            reader.readAsDataURL(blob);
                        });
                    } catch (e) {
                        console.error('Base64 conversion failed', e);
                        return url; // fallback to original URL if conversion fails
                    }
                };

                const imgData = imgSrc ? await toBase64(`https://corsproxy.io?${encodeURIComponent(imgSrc)}`) : null;

                // Programmatically construct a perfectly structured exact 4:5 offline poster div (1080x1350 resolution)
                const poster = document.createElement('div');
                poster.style.position = 'absolute'; // Position absolute avoids viewport issues during scaling
                poster.style.top = '-9999px'; // Render entirely off-screen
                poster.style.left = '-9999px';
                poster.style.width = '1080px';
                poster.style.height = '1350px';
                poster.style.backgroundColor = '#f9f8f4'; // Premium editorial paper white
                poster.style.padding = '80px 80px 10px 80px'; // 10px exactly at the bottom precisely locks the footer!
                poster.style.boxSizing = 'border-box';
                poster.style.display = 'flex';
                poster.style.flexDirection = 'column';
                poster.style.color = 'var(--text-main)';
                poster.style.zIndex = '-100';

                // Safely format Image Block using base64 data URL to avoid CORS issues
                let imgHTML = '';
                if (imgData) {
                    imgHTML = `
                        <div style="width: 100%; height: 500px; border-radius: 4px; margin-bottom: 40px; border: 1px solid rgba(0,0,0,0.1); background-color: #e0e0e0; background-image: url('${imgData}'); background-size: cover; background-position: center; background-repeat: no-repeat;">
                        </div>
                    `;
                }

                // Build immaculate HTML Layout natively
                poster.innerHTML = `
                    <div style="flex-grow: 1; display: flex; flex-direction: column;">
                        <div style="display: flex; justify-content: space-between; align-items: flex-end; border-bottom: 3px solid var(--border-color); padding-bottom: 25px; margin-bottom: 40px;">
                            <div style="font-family: var(--font-display), serif; font-size: 40px; text-transform: uppercase; font-weight: 800; line-height: 1; letter-spacing: -0.02em;">The Dev Summary</div>
                            <div style="font-family: var(--font-mono), monospace; font-size: 22px; color: var(--text-muted); text-transform: uppercase;">${dateStr}</div>
                        </div>
                        
                        ${imgHTML}
                        
                        <h2 style="font-family: var(--font-serif), serif; font-size: 42px; line-height: 1.25; margin: 0 0 35px 0; font-weight: 700;">${title}</h2>
                        <p style="font-family: var(--font-sans), sans-serif; font-size: 32px; color: #333333; line-height: 1.55; margin: 0; overflow: hidden;">${desc}</p>
                    </div>
                    
                    <div style="display: flex; justify-content: center; align-items: center; height: 50px; color: #666666; font-family: var(--font-mono), monospace; font-size: 24px; font-weight: 600; margin-bottom: 12px">
                        <i class="fab fa-github" style="margin-right: 14px; font-size: 30px;"></i>sivasubramoniam-js/daily-tech-news
                    </div>
                `;

                // Inject strictly for the backend Canvas engine to target
                document.body.appendChild(poster);

                // Delay execution momentarily to guarantee font-families append cleanly to the injected DOM graph
                setTimeout(() => {
                    html2canvas(poster, {
                        useCORS: true,
                        scale: 1.5,
                        backgroundColor: '#f9f8f4',
                        logging: false
                    }).then(canvas => {
                        const link = document.createElement('a'); link.download = `tech-news-highlight.png`;
                        link.href = canvas.toDataURL('image/png', 1.0);
                        link.click();
                        poster.remove(); // Safely destroy the phantom DOM element
                        icon.className = originalIconClass; // Restore download UI
                    }).catch(err => {
                        console.error("DOM Image Render failed", err);
                        poster.remove();
                        icon.className = originalIconClass;
                        alert("Sorry! Failed to render the card as an image.");
                    });
                }, 150);
            };

            // Dynamically load html2canvas to save initial page load bandwidth
            if (typeof html2canvas === 'undefined') {
                const script = document.createElement('script');
                script.src = "https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js";
                script.onload = renderAndDownload;
                document.head.appendChild(script);
            } else {
                renderAndDownload();
            }
        }
        // Set dynamic masthead date
        const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
        document.getElementById('dateDisplay').textContent = new Date().toLocaleDateString('en-US', options);

        // Categories Configuration
        const categories = ['all', 'AI', 'AR/VR', 'Backend', 'Cloud', 'Cloud & DevOps', 'Cybersecurity', 'Database', 'Design', 'Design & UX', 'Dev Tools', 'DevOps', 'Engineering', 'Frontend', 'General Tech', 'GitHub Projects', 'Google', 'Metaverse', 'Mobile', 'Open Source', 'Productivity', 'Quantum', 'Research', 'Startup', 'System Design', 'Tech News', 'Testing', 'Web3'];
        let currentCategory = 'all';
        let allNewsData = []; // Store the full list for local filtering

        function initCategoryNav() {
            const list = document.getElementById('categoryList');
            list.innerHTML = '';
            categories.forEach(cat => {
                const li = document.createElement('li');
                li.className = `category-item ${cat === currentCategory ? 'active' : ''}`;
                li.textContent = cat;
                li.onclick = () => filterByCategory(cat);
                list.appendChild(li);
            });
        }

        function filterByCategory(category) {
            currentCategory = category;

            // Update UI
            document.querySelectorAll('.category-item').forEach(el => {
                el.classList.toggle('active', el.textContent.toLowerCase() === category.toLowerCase());
            });

            const container = document.getElementById('news-feed');
            container.innerHTML = '<div class="loading-text">Filtering...</div>';

            let filteredData = allNewsData;
            if (category !== 'all') {
                filteredData = allNewsData.filter(item => {
                    const itemCat = (item.category || 'Tech').toLowerCase();
                    return itemCat === category.toLowerCase() ||
                        (category === 'General Tech' && itemCat === 'tech');
                });
            }

            // Small timeout to give visual feedback of filtering
            setTimeout(() => renderNews(filteredData), 100);
        }

        // Fetch and render news
        const BASE_RAW_URL = 'https://raw.githubusercontent.com/sivasubramoniam-js/daily-tech-news/main/';
        let currentFeedUrl = BASE_RAW_URL + 'news.json';

        async function fetchFeedsList() {
            try {
                const response = await fetch(BASE_RAW_URL + 'feeds.json');
                const feeds = await response.json();

                const select = document.getElementById('feedFilter');

                // Add AssemblyAI as it's custom scraped
                if (!feeds.some(f => f.feedname === 'AssemblyAI')) {
                    feeds.push({ feedname: 'AssemblyAI', category: 'AI' });
                }

                const catGroups = {};
                feeds.forEach(feed => {
                    const cat = feed.category || 'General';
                    if (!catGroups[cat]) catGroups[cat] = [];
                    catGroups[cat].push(feed);
                });

                for (const [category, items] of Object.entries(catGroups).sort()) {
                    const optgroup = document.createElement('optgroup');
                    optgroup.label = `--- ${category} ---`;

                    items.sort((a, b) => a.feedname.localeCompare(b.feedname)).forEach(item => {
                        // Python slugify logic replica
                        let slug = item.feedname.toLowerCase()
                            .replace(/[^\w\s-]/g, '')
                            .replace(/[-\s]+/g, '-')
                            .replace(/^-+|-+$/g, '');

                        // Prevent duplicates
                        if (!Array.from(select.options).some(opt => opt.value === `feeds/${slug}.json`)) {
                            const option = document.createElement('option');
                            option.value = `feeds/${slug}.json`;
                            option.textContent = item.feedname;
                            optgroup.appendChild(option);
                        }
                    });
                    select.appendChild(optgroup);
                }
            } catch (err) {
                console.error("Failed to load feed list", err);
            }
        }

        function handleFilterChange(value) {
            const categoryNav = document.getElementById('categoryNav');
            const newsFeed = document.getElementById('news-feed');
            const marqueeText = document.getElementById('marqueeText');

            newsFeed.innerHTML = '<div class="loading-text">Fetching dispatches...</div>';
            marqueeText.textContent = '';

            if (value === 'news.json') {
                categoryNav.style.display = 'block';
                currentFeedUrl = BASE_RAW_URL + 'news.json';
            } else {
                categoryNav.style.display = 'none';
                currentFeedUrl = BASE_RAW_URL + value; // e.g. feeds/assemblyai.json
            }
            fetchNews(currentFeedUrl);
        }

        async function fetchNews(url = currentFeedUrl) {
            try {
                const response = await fetch(url);
                if (!response.ok) throw new Error('Network response was not ok');
                const data = await response.json();

                // If it's the main feed, store it for filtering
                if (url.includes('news.json')) {
                    allNewsData = data;
                    currentCategory = 'all'; // Reset category state
                    initCategoryNav();
                }

                renderNews(data);
            } catch (error) {
                console.error('Error fetching news:', error);
                document.getElementById('news-feed').innerHTML = '<div class="loading-text" style="color:var(--accent);">Error connecting to the printing press. Please try again.</div>';
            }
        }

        function renderNews(data) {
            const container = document.getElementById('news-feed');
            const marqueeText = document.getElementById('marqueeText');

            container.innerHTML = '';
            marqueeText.textContent = '';

            if (data.length === 0) {
                container.innerHTML = '<div class="loading-text">No articles found in this category.</div>';
                return;
            }

            data.forEach((item, index) => {
                // Determine grid class based on index to create masonry/editorial layout
                let cardClass = 'card-regular';

                if (index === 0) {
                    cardClass = 'card-featured';
                } else if (index < 5) {
                    cardClass = 'card-wide';
                }

                // add title to marquee text
                if (index < data.length - 1) {
                    marqueeText.textContent += item.title + ' | ';
                } else {
                    marqueeText.textContent += item.title;
                }

                // Stagger animation timing
                const animDelay = (index % 10) * 0.1;

                // Calculate reading time based on description length
                const wordCount = item.description ? item.description.split(/\s+/).length : 0;
                const readTime = Math.max(1, Math.ceil(wordCount / 200));
                const image_url = item.image.startsWith("https") ? item.image : BASE_RAW_URL + item.image;

                const pubDate = new Date(item.datetimestamp || item.published);
                const formattedDate = isNaN(pubDate) ? "" : pubDate.toLocaleDateString('en-US', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });

                const cardHTML = `
                    <div class="news-card ${cardClass}" style="animation-delay: ${animDelay}s">
                        ${item.image ? `
                            <div class="news-image-wrapper">
                                <img src="${image_url}" class="news-image" alt="Article image" loading="lazy">
                            </div>
                        ` : `<div class="news-image-wrapper" style="background:#222;display:flex;align-items:center;justify-content:center;color:#fff;font-family:var(--font-mono)"><i class="fas fa-newspaper fa-2x"></i></div>`}
                        <div class="news-content">
                            <div class="news-meta" style="margin-bottom: 6px;">
                                <span style="color: var(--accent); padding-right: 8px;">${item.category || 'Tech'}</span>
                                <span style="color: var(--text-muted);">${formattedDate}</span>
                            </div>
                            <div class="news-meta">
                                <span class="action-icons" style="font-size: 1.1rem; color: var(--text-muted);">
                                    <i class="fas fa-copy" title="Copy to clipboard" style="margin-right: 10px; cursor: pointer;" onclick="copyToClipboard(event)"></i>
                                    <i class="fas fa-download" title="Download as image" id="${index}" style="cursor: pointer;" onclick="downloadAsImage(event)"></i>
                                </span>
                                <span style="color: var(--text-muted);">${readTime} MIN READ</span>
                            </div>
                            <h2 class="news-title">
                                <a href="${item.link}" style="text-decoration: none; color: inherit;" target="_blank" rel="noopener noreferrer">
                                    <span class="title-hover-effect">${item.title}</span>
                                </a>
                            </h2>
                            <p class="news-desc">${item.description}</p>
                        </div>
                    </div>
                `;
                container.innerHTML += cardHTML;
            });

            // marquee scrolling time calculation
            const marqueeContent = document.querySelector('.marquee-content');
            if (marqueeContent) {
                const totalScrollWidth = marqueeContent.scrollWidth;
                const pixelsPerSecond = 50;
                const marqueeTime = totalScrollWidth / pixelsPerSecond;
                marqueeContent.style.animationDuration = marqueeTime + 's';
            }
        }

        // Initialize
        fetchFeedsList();
        fetchNews();
    </script>

    <!-- Google Translate API Scripts -->
    <script type="text/javascript">
        function googleTranslateElementInit() {
            // Force Google API to load the preferred language natively by injecting its expected cookie
            let savedLang = null;
            try { savedLang = localStorage.getItem('custom_lang'); } catch (e) { }
            if (!savedLang) {
                const match = document.cookie.match(/(^|;) ?custom_lang=([^;]*)(;|$)/);
                if (match) savedLang = match[2];
            }
            if (savedLang) {
                document.cookie = `googtrans=/en/${savedLang}; path=/`;
                document.cookie = `googtrans=/en/${savedLang}; domain=${location.hostname}; path=/`;
            }
            console.log("Saved lang : ", savedLang)

            new google.translate.TranslateElement({
                autoDisplay: true
            }, 'google_translate_element');
        }

        // Add a watcher purely to store new language selections going forward
        const observer = new MutationObserver(() => {
            const select = document.querySelector('.goog-te-combo');
            if (select && !select.dataset.listenerAdded) {
                select.dataset.listenerAdded = "true";

                // Because local file:/// paths silently reject cookies, explicitly command the UI to translate
                let savedLang = null;
                try { savedLang = localStorage.getItem('custom_lang'); } catch (e) { }

                if (savedLang) {
                    select.value = savedLang;
                    select.dispatchEvent(new Event('change')); // Force API to translate

                    // Backup execution in case Google script has latency generating the <option> elements
                    setTimeout(() => {
                        if (select.value !== savedLang) {
                            select.value = savedLang;
                            select.dispatchEvent(new Event('change'));
                        }
                    }, 500);
                }

                select.addEventListener('change', (e) => {
                    if (e.target.value) {
                        try { localStorage.setItem('custom_lang', e.target.value); } catch (err) { }
                        document.cookie = `custom_lang=${e.target.value}; path=/; max-age=31536000`; // 1 year
                        document.cookie = `googtrans=/en/${e.target.value}; path=/`; // Explicitly assist Google API
                        console.log("Stored language selection:", e.target.value);
                    }
                });
            }
        });
        observer.observe(document.body, { childList: true, subtree: true });

    </script>
    <script type="text/javascript"
        src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
</body>
